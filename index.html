<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBL Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-100">

<div class="p-6">
<h1 class="text-3xl font-bold mb-4">OBL Executive Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
<div class="bg-white p-6 rounded-xl shadow">
<p>Total</p>
<h2 id="totalUsers" class="text-4xl font-bold">0</h2>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p>Pass Rate</p>
<h2 id="passRate" class="text-4xl font-bold">0%</h2>
</div>
</div>

<div class="bg-white p-6 rounded-xl shadow mb-6">
<canvas id="topicChart"></canvas>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<input id="searchInput" class="border p-2 rounded w-full mb-4" placeholder="ค้นหา">

<table class="w-full">
<thead>
<tr>
<th class="text-left">ชื่อ</th>
<th class="text-left">ฝ่าย</th>
<th class="text-left">ตำแหน่ง</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script src="./assets/js/app.js"></script>

</body>
</html>
